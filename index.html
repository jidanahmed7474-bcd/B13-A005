<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tailwind.css">
</head>

<body class="font-family: " Geist", sans-serif;">
    <!-- LOGIN PAGE -->
    <div id="login-page">
        <div class="login-card">
            <div class=" flex items-center justify-center">
                <img src="assets/github-logo.png">
            </div>
            <p class="login-logo-text text-center">GitHub Issues Tracker</p>

            <p class="login-subtitle text-center">Sign in to manage your issues</p>

            <div class="input-group">
                <label for="username" class="text-[#1F2937]">Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
            </div>
            <p class="text-[#4A00FF]">Default: admin</p>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" />
            </div>
            <p class="text-[#4A00FF]">Default: admin123</p>
            <div class="login-error" id="login-error">❌ Invalid username or password.</div>
            <button class="login-btn" onclick="handleLogin()">Sign In</button>

            <div class="demo-creds">
                <p class="text-center">Demo Credentials</p>
                <div class="text-center">
                    <h2>Username: admin</h2>
                    <h2>Password: admin123</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN PAGE -->
  <div id="main-page">
    <nav class="navbar">
      <div class="nav-brand">
        <img src="assets/github-logo.png">
        Issues Tracker
      </div>
      <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search issues..."
          onkeydown="if(event.key==='Enter') doSearch()" />
        <button class="search-btn" onclick="doSearch()">Search</button>
      </div>
    </nav>

     <div class="content">
      <!-- Search badge -->
      <div class="search-result-badge" id="search-badge">
        <span id="search-badge-text"></span>
        <button class="clear-search" onclick="clearSearch()">✕ Clear</button>
      </div>

        <!-- Tab section -->
      <div class="tab-header">
        <div class="tabs">
          <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
            All
          </button>
          <button class="tab-btn" id="tab-open" onclick="switchTab('open')">
            Open
          </button>
          <button class="tab-btn" id="tab-closed" onclick="switchTab('closed')">
            Closed
          </button>
        </div>

        <div class="tab-info-bar">
          <div class="tab-info-left">
            <div class="tab-info-icon">
              <img src="assets/Aperture.png">
            </div>
            <div>
              <div class="tab-info-title" id="tab-info-title">0 Issues</div>
              <div class="tab-info-sub">Track and manage your project issues</div>
            </div>
          </div>
          <div class="tab-info-right">
            <span class="status-indicator">
              <span class="status-dot open"></span>
              Open
            </span>
            <span class="status-indicator">
              <span class="status-dot closed"></span>
              Closed
            </span>
          </div>
        </div>
      </div>

          <!-- Issues Grid / Spinner -->
      <div id="spinner-wrap" class="spinner-wrap">
        <div class="spinner"></div>
      </div>
      <div class="issues-grid" id="issues-grid" style="display:none;"></div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div style="font-size:48px;">🔍</div>
        <p>No issues found.</p>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-id" id="modal-id"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-desc" id="modal-desc"></div>
        <div class="modal-grid" id="modal-grid"></div>
        <div class="modal-labels" id="modal-labels"></div>
      </div>
    </div>
  </div>

    <script src="script.js"></script>
</body>

</html>
